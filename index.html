<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorkiFy</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main id="auth-screen">
      <section class="auth-card">
        <h1 class="auth-logo">Work<span>i</span>Fy</h1>

        <nav class="tab-row">
          <button class="tab-btn active" data-tab="login">Вхід</button>
          <button class="tab-btn" data-tab="register">Реєстрація</button>
        </nav>

        <div id="auth-error"></div>

        <form id="login-form">
          <input type="email" id="login-email" required />
          <input type="password" id="login-password" required />
          <button class="btn-primary">Увійти</button>
        </form>

        <form id="register-form" style="display: none">
          <input type="text" id="reg-name" required />
          <input type="email" id="reg-email" required />
          <input type="password" id="reg-password" required />
          <button class="btn-primary">Зареєструватись</button>
        </form>
      </section>
    </main>

    <div id="app">
      <button class="burger-btn" id="burger-btn">☰</button>

      <div class="mobile-menu" id="mobile-menu">
        <button id="close-menu">✖</button>
        <button class="mobile-link" data-page="dashboard">Дашборд</button>
      </div>

      <aside class="sidebar">
        <button class="nav-item active" data-page="dashboard">Дашборд</button>
        <button id="logout-btn">Вийти</button>
      </aside>

      <main class="main">
        <section class="page active" id="page-dashboard">
          <h2>Панель керування</h2>
          <button class="btn-primary">Зберегти</button>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
